<div class="command-result ai-chat-result" data-query="{{searchQuery}}" data-api-key="{{apiKey}}" data-model="{{model}}">
  <div class="ai-chat-header">
    <div class="ai-chat-badge">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span>AI Chat</span>
    </div>
    <p class="ai-chat-query">Ask about: <strong>{{searchQuery}}</strong></p>
  </div>
  
  <div class="ai-chat-messages">
    <div class="ai-message ai-message-assistant">
      <div class="ai-avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="ai-message-content">
        {{content}}
      </div>
    </div>
  </div>

  <div class="ai-sources-section" style="{{sourcesDisplay}}">
    <h4 class="ai-sources-heading">Sources</h4>
    <div class="ai-sources-list">
      {{sources}}
    </div>
  </div>

  <div class="ai-chat-input-container">
    <div class="ai-chat-input-wrap">
      <input type="text" class="ai-chat-input" placeholder="Ask a follow-up question..." autocomplete="off">
      <button class="ai-chat-send" type="button" aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
    <p class="ai-disclaimer">AI-generated content may be inaccurate. Please verify important information.</p>
  </div>
</div>
